name: Build and release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ubuntu-build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            zlib1g-dev \
            libssl-dev

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j$(nproc)

      - name: Prepare package
        run: |
          mkdir -p minecraftspeedproxy
          cp build/minecraftspeedproxy minecraftspeedproxy/
          cp LICENSE minecraftspeedproxy/
          tar -czf minecraftspeedproxy-linux-amd64.tar.gz minecraftspeedproxy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: minecraftspeedproxy-linux-amd64
          path: minecraftspeedproxy-linux-amd64.tar.gz

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: TODO New Release.
          draft: false
          prerelease: false
          files: minecraftspeedproxy-linux-amd64.tar.gz
